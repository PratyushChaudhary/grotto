name: AI Pipeline

# Runs when anything inside mlflow-service/ changes on main,
# or on any PR touching that directory.
# Can also be triggered manually with custom hyperparameters.

on:
  push:
    branches: [main]
    paths:
      - "mlflow-service/**"
  pull_request:
    branches: [main]
    paths:
      - "mlflow-service/**"
  workflow_dispatch:
    inputs:
      epochs:
        description: "Training epochs"
        required: false
        default: "2"
      learning_rate:
        description: "Learning rate"
        required: false
        default: "3e-5"
      perplexity_threshold:
        description: "Max acceptable perplexity (gate)"
        required: false
        default: "200"

permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

env:
  MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"   # local SQLite for CI
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/grotto-ai-service

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — Train & track with MLflow
  # ──────────────────────────────────────────────────────────────────────────
  train:
    name: Train Model (MLflow)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: mlflow-service/requirements.txt

      - name: Install dependencies
        run: pip install -r mlflow-service/requirements.txt

      - name: Train model
        working-directory: mlflow-service
        env:
          EPOCHS: ${{ github.event.inputs.epochs || '2' }}
          LR: ${{ github.event.inputs.learning_rate || '3e-5' }}
        run: |
          python train.py \
            --epochs "$EPOCHS" \
            --lr "$LR" \
            --max-length 128 \
            --batch-size 4

      # Upload MLflow DB + artifacts + run metadata so downstream jobs can use them
      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            mlflow-service/mlflow.db
            mlflow-service/mlruns/
            mlflow-service/run_meta.json
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — Evaluate & promote in MLflow Model Registry
  # ──────────────────────────────────────────────────────────────────────────
  evaluate:
    name: Evaluate & Promote (MLflow Registry)
    runs-on: ubuntu-latest
    needs: train

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: mlflow-service/requirements.txt

      - name: Install dependencies
        run: pip install -r mlflow-service/requirements.txt

      - name: Download MLflow artifacts
        uses: actions/download-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlflow-service/

      - name: Evaluate model & promote to Production
        working-directory: mlflow-service
        env:
          PPL_THRESHOLD: ${{ github.event.inputs.perplexity_threshold || '200' }}
        run: |
          python evaluate.py \
            --perplexity-threshold "$PPL_THRESHOLD" \
            --min-improvement 0

      - name: Upload promotion metadata
        uses: actions/upload-artifact@v4
        with:
          name: promotion-meta
          path: mlflow-service/promotion_meta.json
          retention-days: 7

      - name: Print summary
        working-directory: mlflow-service
        run: |
          echo "### MLflow Promotion Summary" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat promotion_meta.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build & push Docker image (only on main, not PRs)
  # ──────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: evaluate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: mlflow-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image summary
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "SHA tag: \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
